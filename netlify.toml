# Redirect duplicate /veterans-benefits/healthcare/ to canonical /health-care/
[[redirects]]
  from = "/veterans-benefits/healthcare/*"
  to = "/veterans-benefits/health-care/:splat"
  status = 301
  force = true

# Chat page clean URL
[[redirects]]
  from = "/chat"
  to = "/chat.html"
  status = 200

# Custom 404 page (must be last redirect rule)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
