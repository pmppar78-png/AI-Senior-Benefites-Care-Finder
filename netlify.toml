[functions]
directory = "netlify/functions"

[build]
publish = "."

# Redirect /costs/ to /cost/ (canonicalize duplicate URL structure)
[[redirects]]
  from = "/assisted-living/costs/*"
  to = "/assisted-living/cost/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/home-care/costs/*"
  to = "/home-care/cost/:splat"
  status = 301
  force = true

# Redirects for legacy/alternate URLs to canonical trust pages
[[redirects]]
  from = "/editorial-standards"
  to = "/editorial-policy/"
  status = 301

[[redirects]]
  from = "/editorial-standards/"
  to = "/editorial-policy/"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy-policy/"
  status = 301

[[redirects]]
  from = "/privacy/"
  to = "/privacy-policy/"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/terms-of-use/"
  status = 301

[[redirects]]
  from = "/terms/"
  to = "/terms-of-use/"
  status = 301

[[redirects]]
  from = "/terms-of-service"
  to = "/terms-of-use/"
  status = 301

[[redirects]]
  from = "/terms-of-service/"
  to = "/terms-of-use/"
  status = 301

[[redirects]]
  from = "/who-we-are"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/who-we-are/"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/mission"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/mission/"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/why-trust-us"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/why-trust-us/"
  to = "/about/"
  status = 301

# Redirect broken breadcrumb state/city paths to section landing pages
# These only fire when no file exists at the path (no force flag)
[[redirects]]
  from = "/assisted-living/:state/:city/"
  to = "/assisted-living/"
  status = 301

[[redirects]]
  from = "/home-care/:state/:city/"
  to = "/home-care/"
  status = 301

[[redirects]]
  from = "/medicaid/:state/:city/"
  to = "/medicaid/"
  status = 301

[[redirects]]
  from = "/providers/:state/:city/"
  to = "/providers/"
  status = 301

# Chat page clean URL
[[redirects]]
  from = "/chat"
  to = "/chat.html"
  status = 200

# Custom 404 page (must be last redirect rule)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
