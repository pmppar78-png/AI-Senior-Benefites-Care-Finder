  {{#if faqs}}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {{#each faqs}}
      {
        "@type": "Question",
        "name": "{{question}}",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "{{answer}}"
        }
      }{{#if @last}}{{else}},{{/if}}
      {{/each}}
    ]
  }
  </script>
  {{/if}}
